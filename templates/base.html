{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mantenedor{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="{% static 'AdminLTE-4.0.0-beta3/dist/css/adminlte.min.css' %}">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">

<!-- BASE GLOBAL -->

<div class="app-wrapper">

    <!-- NAVBAR -->
    <nav class="app-header navbar navbar-expand bg-body">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" data-lte-toggle="sidebar" href="#">
                        <i class="bi bi-list"></i>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside class="app-sidebar bg-dark shadow" data-bs-theme="dark">
        <div class="sidebar-brand">
            <a href="{% url 'dashboard:dashboard' %}" class="brand-link">
                <span class="brand-text fw-light">Mantenedor</span>
            </a>
        </div>

        <div class="sidebar-wrapper">
            <nav class="mt-2">
                <ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview">

                    <li class="nav-item">
                        <a href="{% url 'dashboard:dashboard' %}" class="nav-link">
                            <i class="nav-icon bi bi-speedometer2"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'eventos:registrar_evento' %}" class="nav-link">
                            <i class="nav-icon bi bi-plus-circle"></i>
                            <p>Registrar Evento</p>
                        </a>
                    </li>

                </ul>
            </nav>
        </div>
    </aside>

    <!-- CONTENIDO -->
    <main class="app-main">
        <div class="app-content p-3">
            {% block content %}{% endblock %}
        </div>
    </main>

</div>

<script src="{% static 'AdminLTE-4.0.0-beta3/dist/js/adminlte.min.js' %}"></script>
</body>
</html>
