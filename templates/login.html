{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Mantenedor | Iniciar sesión</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fuente -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fontsource/source-sans-3@5.0.12/index.css"
      crossorigin="anonymous"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      crossorigin="anonymous"
    />

    <!-- AdminLTE (LOCAL) -->
    <link rel="stylesheet" href="{% static 'AdminLTE-4.0.0-beta3/dist/css/adminlte.min.css' %}" />
  </head>

  <body class="login-page bg-body-secondary">

    <div class="login-box">

      <div class="login-logo">
        <a href="{% url 'login' %}"><b>Mantenedor</b></a>
      </div>

      <div class="card">
        <div class="card-body login-card-body">

          <p class="login-box-msg">Inicia sesión para continuar</p>

          {% if form.non_field_errors %}
            <div class="alert alert-danger py-2">
              {{ form.non_field_errors }}
            </div>
          {% endif %}

          <form method="post" novalidate>
            {% csrf_token %}

            <div class="input-group mb-3">
              <input
                type="text"
                name="{{ form.username.html_name }}"
                value="{{ form.username.value|default_if_none:'' }}"
                class="form-control"
                placeholder="Usuario"
                autocomplete="username"
                required
                id="id_username"
              />
              <div class="input-group-text">
                <span class="bi bi-person-fill"></span>
              </div>
            </div>
            {{ form.username.errors }}

            <div class="input-group mb-3">
              <input
                type="password"
                name="{{ form.password.html_name }}"
                class="form-control"
                placeholder="Contraseña"
                autocomplete="current-password"
                required
                id="id_password"
              />
              <div class="input-group-text">
                <span class="bi bi-lock-fill"></span>
              </div>
            </div>
            {{ form.password.errors }}

            <div class="row">
              <div class="col-8">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="1" id="rememberMe" name="remember" />
                  <label class="form-check-label" for="rememberMe">Recordarme</label>
                </div>
              </div>

              <div class="col-4">
                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary">Ingresar</button>
                </div>
              </div>
            </div>

            {% if next %}
              <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
          </form>

          <p class="mb-1 mt-3">
            <a href="#" onclick="return false;">Olvidé mi contraseña</a>
          </p>

        </div>
      </div>

    </div>

    <!-- AdminLTE (LOCAL) -->
    <script src="{% static 'AdminLTE-4.0.0-beta3/dist/js/adminlte.min.js' %}"></script>
  </body>
</html>
